# backend/pytest.ini
#
# Pytest configuration for Nidus ERP.
#
# Why pytest.ini (not pyproject.toml): the project doesn't have a pyproject.toml
# yet and this is the single-purpose config pytest reads first. If we migrate to
# pyproject.toml later for packaging, these settings move into [tool.pytest.ini_options].
#
# Run tests from the backend/ directory with:
#     pytest                  # run everything
#     pytest authentication/  # run one app
#     pytest -k login         # run tests whose name contains 'login'
#     pytest --cov=.          # run with coverage report

[pytest]
# Tells pytest-django which Django settings module to use. Without this the
# test runner would not know how to bootstrap Django.
DJANGO_SETTINGS_MODULE = nidus_erp.settings

# Files that pytest treats as test modules. We use the standard test_*.py
# convention so test files are instantly recognisable.
python_files = test_*.py

# Directories pytest searches. Each is a Django app. Adding new apps later
# (contacts, sales, etc.) means appending them here.
testpaths =
    authentication
    companies
    chartofaccounts
    journals
    reports

# Default command-line flags applied on every run:
#   --strict-markers  → typos in @pytest.mark.xxx raise errors, not silently pass
#   --tb=short        → compact tracebacks (full ones are noisy in CI)
#   -ra               → show a summary of failures + errors + skips at the end
#   --reuse-db        → REUSE the test DB between runs (5-10× faster). On schema
#                       changes, pass --create-db once to rebuild.
addopts =
    --strict-markers
    --tb=short
    -ra
    --reuse-db

# Custom markers — declaring them here makes `--strict-markers` enforce spelling.
# Usage: @pytest.mark.slow to tag a test, then `pytest -m "not slow"` to skip them.
markers =
    slow: tests that take >1 second (export rendering, large fixtures)
    integration: tests that span multiple apps / full request lifecycle
    unit: fast isolated tests (single function, minimal fixtures)